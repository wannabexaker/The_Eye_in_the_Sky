name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  OWNER: wannabexaker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── API ────────────────────────────────────────────────
      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tsogos-api:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tsogos-api:${{ github.ref_name }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # ─── Player Web ─────────────────────────────────────────
      - name: Build & Push Player Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/player-web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tsogos-player-web:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tsogos-player-web:${{ github.ref_name }}
          cache-from: type=gha,scope=player-web
          cache-to: type=gha,mode=max,scope=player-web

      # ─── Admin Web ──────────────────────────────────────────
      - name: Build & Push Admin Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin-web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tsogos-admin-web:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/tsogos-admin-web:${{ github.ref_name }}
          cache-from: type=gha,scope=admin-web
          cache-to: type=gha,mode=max,scope=admin-web
