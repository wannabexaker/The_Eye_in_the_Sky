<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Shell layout mockup v3</title>
<style>
  :root{
    --gold:#e2be70; --gold-bright:#ffe7a8; --ink:#f4efe6;
    --panel:linear-gradient(180deg,rgba(20,18,23,.82),rgba(12,11,15,.9));
    --line:rgba(226,190,112,.16); --gap:clamp(6px,1vw,12px);
  }
  *{box-sizing:border-box;margin:0}
  html,body{height:100%}
  body{font-family:Georgia,serif;color:var(--ink);
    background:radial-gradient(circle at 50% 20%,#1b1714,#0b0a0d 75%);overflow:hidden}

  /* ONE shell, pure grid flow (nothing fixed) */
  .shell{height:100dvh;width:100vw;padding:var(--gap);gap:var(--gap);display:grid;
    grid-template-areas:"brand" "board" "info" "deck";
    grid-template-rows:auto minmax(0,1fr) auto auto}
  .zone{min-width:0;min-height:0;position:relative}
  .card{border:1px solid var(--line);border-radius:11px;background:rgba(26,20,14,.5);padding:7px 9px}
  .card h4{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(244,239,230,.55);
    margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
  .stat{text-align:center}.stat b{color:var(--gold-bright);font-size:13px;display:block;line-height:1.1}
  .stat span{font-size:8px;letter-spacing:.12em;color:rgba(244,239,230,.5)}

  /* BRAND — discreet */
  .brand{grid-area:brand;display:flex;align-items:center;justify-content:center;gap:10px;padding:4px 10px}
  .brand .logo{font-weight:700;letter-spacing:.14em;color:var(--gold-bright);font-size:clamp(12px,1.8vw,18px);text-shadow:0 0 14px rgba(226,190,112,.3)}
  .brand .watch{font-size:10px;color:rgba(244,239,230,.45)}

  /* BOARD — fills */
  .board{grid-area:board;display:grid;place-items:center;padding:2px}
  .grid{aspect-ratio:6/5;width:100%;max-width:100%;max-height:100%;
    display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(5,1fr);
    gap:clamp(3px,.6vw,7px);padding:clamp(6px,1vw,12px);border:1px solid var(--line);border-radius:16px;
    background:linear-gradient(180deg,rgba(10,10,13,.3),rgba(8,8,11,.4))}
  .cell{border-radius:10px;background:radial-gradient(circle at 50% 40%,rgba(226,190,112,.10),transparent 60%),rgba(40,30,26,.55);border:1px solid rgba(226,190,112,.08)}

  /* INFO — TWO columns: left = all other panels, right = ritual log/history */
  .info{grid-area:info;display:grid;gap:8px;grid-template-columns:minmax(0,1.05fr) minmax(0,1fr);
    align-items:stretch;overflow:hidden}
  .info-stats{display:grid;gap:6px;grid-auto-rows:min-content;min-width:0}
  .info-ritual{display:flex;flex-direction:column;min-width:0;min-height:0;overflow:hidden}

  /* discreet treasury chips */
  .topbar{display:flex;align-items:center;gap:6px}
  .chip{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.04);color:var(--ink);
    padding:5px 12px;font-size:10px;letter-spacing:.08em;cursor:pointer}
  .chip.primary{background:linear-gradient(180deg,rgba(226,190,112,.9),rgba(166,121,46,.92));color:#17120f;font-weight:700;border-color:transparent}
  .bb{display:flex;justify-content:space-around;gap:10px}
  .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

  /* ritual log: header + scrollable history rows, expandable */
  .log h4{cursor:pointer}
  .more{font-size:8px;color:var(--gold);letter-spacing:.1em;opacity:.85}
  .loglist{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-top:4px}
  .logrow{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:5px 8px;border-radius:8px;background:rgba(255,255,255,.03)}
  .logrow b{color:var(--gold-bright)} .logrow .l{color:rgba(244,239,230,.5);font-size:9px;letter-spacing:.1em}

  /* DECK — REAL rotating ouroboros sits where .spin is */
  .deck{grid-area:deck;display:flex;align-items:center;justify-content:center;gap:clamp(10px,2vw,22px);padding:6px}
  .spin{position:relative;width:clamp(76px,13vw,110px);aspect-ratio:1;display:grid;place-items:center}
  .spin .ring{position:absolute;inset:0;border-radius:50%;border:5px solid transparent;
    border-top-color:#f4d894;border-right-color:#d7a854;border-bottom-color:#b37e30;border-left-color:#e3be71;
    box-shadow:0 0 18px rgba(226,190,112,.3);animation:spin 6s linear infinite}
  .spin .core{width:58%;aspect-ratio:1;border-radius:50%;display:grid;place-items:center;
    background:radial-gradient(circle at 34% 28%,#fff7d8,#e2be70 40%,#9a6c29 76%,#4a300f);color:#18120e;font-weight:700;font-size:12px;letter-spacing:.1em}
  .spin .note{position:absolute;bottom:-15px;font-size:8px;color:rgba(226,190,112,.55);white-space:nowrap}
  @keyframes spin{to{transform:rotate(360deg)}}
  .bet,.auto{display:flex;align-items:center;gap:8px}
  .pill{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.04);padding:6px 12px;font-size:13px;color:var(--gold-bright)}
  .ico{width:30px;height:30px;border:1px solid var(--line);border-radius:8px;display:grid;place-items:center;color:rgba(226,190,112,.8)}

  /* WIDE (desktop OR landscape): info-rail │ board │ brand, deck under board.
     The rail stacks stats on top and ritual fills the rest (vertical 2-zone). */
  @media (min-width:900px),(orientation:landscape){
    .shell{grid-template-areas:"info board brand" "info deck brand";
      grid-template-columns:minmax(196px,18vw) minmax(0,1fr) minmax(150px,13vw);
      grid-template-rows:minmax(0,1fr) auto}
    .info{grid-template-columns:1fr;grid-template-rows:auto minmax(0,1fr);align-content:start}
    .brand{flex-direction:column;justify-content:flex-start;padding-top:8px}
  }
</style></head>
<body>
  <div class="shell">
    <section class="zone brand"><div class="logo">THE EYE IN THE SKY</div><div class="watch">Temple Watch</div></section>

    <section class="zone board"><div class="grid" id="grid"></div></section>

    <section class="zone info">
      <!-- LEFT: all the other panels -->
      <div class="info-stats">
        <div class="topbar"><button class="chip primary">＋ Deposit</button><button class="chip">－ Withdraw</button></div>
        <div class="card"><div class="bb"><div class="stat"><b>€0</b><span>Balance</span></div><div class="stat"><b>€0.1</b><span>Bet</span></div><div class="stat"><b>0/17</b><span>Samsara</span></div></div></div>
        <div class="card"><div class="three"><div class="stat"><b>0.00</b><span>Round</span></div><div class="stat"><b>0</b><span>Cascade</span></div><div class="stat"><b>0</b><span>Spins</span></div></div></div>
      </div>
      <!-- RIGHT: ritual log / history -->
      <div class="info-ritual card log">
        <h4>Ritual Log <span class="more">▾ tap for full history</span></h4>
        <div class="loglist">
          <div class="logrow"><b>+2.07</b><span class="l">Win · base</span></div>
          <div class="logrow"><b>−0.10</b><span class="l">Loss · base</span></div>
        </div>
      </div>
    </section>

    <footer class="zone deck">
      <div class="bet"><div class="ico">−</div><div class="pill">0.1</div><div class="ico">+</div></div>
      <div class="spin"><div class="ring"></div><div class="core">SPIN</div><div class="note">↻ real ouroboros (rotating)</div></div>
      <div class="auto"><div class="ico">⏩</div><div class="ico">⏭</div><div class="pill" style="font-size:11px">NORMAL</div></div>
    </footer>
  </div>
  <script>const g=document.getElementById('grid');for(let i=0;i<30;i++){const c=document.createElement('div');c.className='cell';g.appendChild(c);}</script>
</body></html>
